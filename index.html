<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Bel-Engleezi Test</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .quiz-container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        .question { margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        .question-text { font-size: 1.2rem; font-weight: bold; color: #34495e; margin-bottom: 15px; }
        .options { list-style: none; padding: 0; }
        .option { background: #f8f9fa; margin: 10px 0; padding: 12px; border-radius: 5px; cursor: pointer; transition: 0.3s; border: 1px solid #ddd; text-align: left; direction: ltr; }
        .option:hover { background: #e9ecef; border-color: #3498db; }
        .hint { color: #7f8c8d; font-style: italic; font-size: 0.9rem; margin-top: 10px; display: block; }
        .correct { background: #d4edda !important; border-color: #28a745 !important; }
        .wrong { background: #f8d7da !important; border-color: #dc3545 !important; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>اختبار تحديد المستوى (B1+) - Bel-Engleezi</h1>
    <div id="quiz"></div>
</div>

<script>
const quizData = [
    {
      "question": "Which sentence correctly describes a permanent state or a long-term situation?",
      "options": ["She is living in London until her course finishes.", "She lives in London and works as a freelance architect.", "She has lived in London since she was a child.", "She was living in London when we first met."],
      "correct": 1,
      "hint": "Think about which tense we use for things that are generally true or permanent."
    },
    {
      "question": "Choose the most natural response for a professional follow-up: 'I ______ the report you requested yesterday morning.'",
      "options": ["sent", "have sent", "was sending", "send"],
      "correct": 0,
      "hint": "Look for the specific time marker in the sentence."
    },
    // يمكنك إضافة باقي الـ 15 سؤال هنا بنفس التنسيق
];

function loadQuiz() {
    const quizContainer = document.getElementById('quiz');
    let output = '';

    quizData.forEach((q, index) => {
        output += `
            <div class="question">
                <div class="question-text">${index + 1}. ${q.question}</div>
                <ul class="options">
                    ${q.options.map((opt, i) => `
                        <li class="option" onclick="checkAnswer(this, ${i}, ${q.correct})">${opt}</li>
                    `).join('')}
                </ul>
                <span class="hint">💡 Hint: ${q.hint}</span>
            </div>
        `;
    });
    quizContainer.innerHTML = output;
}

function checkAnswer(element, selected, correct) {
    const parent = element.parentElement;
    const options = parent.querySelectorAll('.option');
    
    options.forEach(opt => opt.style.pointerEvents = 'none'); // منع الاختيار مرة تانية

    if (selected === correct) {
        element.classList.add('correct');
    } else {
        element.classList.add('wrong');
        options[correct].classList.add('correct');
    }
}

loadQuiz();
</script>

</body>
</html>
